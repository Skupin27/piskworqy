<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gomoku</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #272727;
    --text: #e8e8e8;
    --muted: #555;
    --black-stone: #1a1a1a;
    --white-stone: #f0ede6;
    --accent: #c8a96e;
    --accent-dim: rgba(200,169,110,0.12);
    --red: #e05252;
    --green: #52c87a;
    --grid: #252525;
    --hover: rgba(200,169,110,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo span { color: var(--muted); }

  #status-bar {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  main {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 40px;
    padding: 40px 32px;
    width: 100%;
    max-width: 1100px;
  }

  /* ── LOBBY ── */
  #lobby {
    width: 360px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  button {
    padding: 10px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #0d0d0d;
    font-weight: 500;
  }
  .btn-primary:hover { filter: brightness(1.1); }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .error { color: var(--red); font-size: 12px; font-family: 'DM Mono', monospace; }
  .info  { color: var(--muted); font-size: 12px; font-family: 'DM Mono', monospace; }

  /* ── SIDEBAR ── */
  #sidebar {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 200px;
    min-width: 180px;
  }

  .player-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s;
  }
  .player-card.active { border-color: var(--accent); }

  .stone-indicator {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  .stone-indicator.black { background: var(--black-stone); border: 1px solid #444; }
  .stone-indicator.white { background: var(--white-stone); border: 1px solid #ccc; }

  .player-info { flex: 1; min-width: 0; }
  .player-name {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-score {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  #turn-indicator {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
    height: 16px;
  }

  #room-info {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  #room-info span { color: var(--text); }

  /* ── BOARD ── */
  #board-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  #board-container {
    position: relative;
    background: #111;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px;
    cursor: crosshair;
  }

  #board-canvas {
    display: block;
    image-rendering: crisp-edges;
  }

  /* ── OVERLAY ── */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }

  #overlay.hidden { display: none; }

  .overlay-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 40px 48px;
    text-align: center;
    max-width: 360px;
    width: 90%;
    display: flex;
    flex-direction: column;
    gap: 20px;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .overlay-title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .overlay-sub {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .overlay-actions { display: flex; gap: 10px; justify-content: center; }

  /* hidden util */
  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo">gom<span>·</span>oku</div>
  <div id="status-bar">not connected</div>
</header>

<main>

  <!-- LOBBY -->
  <div id="lobby">
    <div class="card">
      <div class="section-label">your name</div>
      <input type="text" id="nickname" placeholder="nickname" maxlength="20" autocomplete="off">
    </div>

    <div class="card">
      <div class="section-label">create room</div>
      <input type="text" id="create-room-id" placeholder="room name" maxlength="24" autocomplete="off">
      <button class="btn-primary" onclick="createRoom()">Create Room</button>
    </div>

    <div class="card">
      <div class="section-label">join room</div>
      <input type="text" id="join-room-id" placeholder="room name" maxlength="24" autocomplete="off">
      <button class="btn-primary" onclick="joinRoom()">Join Room</button>
    </div>

    <div id="lobby-msg" class="info"></div>
  </div>

  <!-- GAME -->
  <div id="game-area" class="hidden" style="display:flex;gap:40px;align-items:flex-start;">
    <div id="sidebar">
      <div id="room-info">
        Room: <span id="room-name-display">—</span>
      </div>
      <div id="turn-indicator">—</div>
      <div class="player-card" id="p0-card">
        <div class="stone-indicator black"></div>
        <div class="player-info">
          <div class="player-name" id="p0-name">—</div>
          <div class="player-score" id="p0-score">0 wins</div>
        </div>
      </div>
      <div class="player-card" id="p1-card">
        <div class="stone-indicator white"></div>
        <div class="player-info">
          <div class="player-name" id="p1-name">—</div>
          <div class="player-score" id="p1-score">0 wins</div>
        </div>
      </div>
      <button class="btn-secondary" onclick="leaveGame()" style="margin-top:8px;">Leave</button>
    </div>

    <div id="board-wrap">
      <div id="board-container">
        <canvas id="board-canvas"></canvas>
      </div>
    </div>
  </div>

</main>

<!-- RESULT OVERLAY -->
<div id="overlay" class="hidden">
  <div class="overlay-card">
    <div class="overlay-title" id="overlay-title">—</div>
    <div class="overlay-sub" id="overlay-sub"></div>
    <div class="overlay-actions">
      <button class="btn-primary" id="overlay-rematch" onclick="rematch()">Play Again</button>
      <button class="btn-secondary" onclick="leaveGame()">Leave</button>
    </div>
  </div>
</div>

<script>
const BOARD_SIZE = 15;
const CELL = 38;
const STONE_R = 15;
const canvas = document.getElementById('board-canvas');
const ctx = canvas.getContext('2d');

const socket = io();

let state = {
  roomId: null,
  playerIndex: null,
  board: null,
  turn: null,
  scores: [0, 0],
  players: ['', ''],
  myNickname: '',
};

// ── Canvas setup ──
const W = (BOARD_SIZE - 1) * CELL;
canvas.width  = W;
canvas.height = W;

function drawBoard(board) {
  ctx.clearRect(0, 0, W, W);

  // Grid lines
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 1;
  for (let i = 0; i < BOARD_SIZE; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, W);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * CELL); ctx.lineTo(W, i * CELL);
    ctx.stroke();
  }

  // Star points
  const stars = [3, 7, 11];
  ctx.fillStyle = '#3a3a3a';
  for (const r of stars) for (const c of stars) {
    ctx.beginPath();
    ctx.arc(c * CELL, r * CELL, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Stones
  if (!board) return;
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      const v = board[r][c];
      if (!v) continue;
      const x = c * CELL, y = r * CELL;
      const grad = ctx.createRadialGradient(x - 4, y - 4, 2, x, y, STONE_R);
      if (v === 'black') {
        grad.addColorStop(0, '#555');
        grad.addColorStop(1, '#111');
      } else {
        grad.addColorStop(0, '#fff');
        grad.addColorStop(1, '#ccc');
      }
      ctx.beginPath();
      ctx.arc(x, y, STONE_R, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.strokeStyle = v === 'black' ? '#333' : '#aaa';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }
}

// ── Hover effect ──
let hoverCell = null;
canvas.addEventListener('mousemove', e => {
  if (!state.board) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top)  * scaleY;
  const col = Math.round(px / CELL);
  const row = Math.round(py / CELL);
  if (col >= 0 && col < BOARD_SIZE && row >= 0 && row < BOARD_SIZE) {
    hoverCell = { row, col };
  } else {
    hoverCell = null;
  }
  redraw();
});

canvas.addEventListener('mouseleave', () => { hoverCell = null; redraw(); });

function redraw() {
  drawBoard(state.board);
  if (hoverCell && state.turn === state.playerIndex && state.board && !state.board[hoverCell.row][hoverCell.col]) {
    const { row, col } = hoverCell;
    ctx.beginPath();
    ctx.arc(col * CELL, row * CELL, STONE_R, 0, Math.PI * 2);
    ctx.fillStyle = state.playerIndex === 0 ? 'rgba(40,40,40,0.5)' : 'rgba(240,240,240,0.35)';
    ctx.fill();
  }
}

canvas.addEventListener('click', e => {
  if (state.turn !== state.playerIndex || !state.board) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top)  * scaleY;
  const col = Math.round(px / CELL);
  const row = Math.round(py / CELL);
  if (col < 0 || col >= BOARD_SIZE || row < 0 || row >= BOARD_SIZE) return;
  if (state.board[row][col]) return;
  socket.emit('place_stone', { roomId: state.roomId, row, col });
});

// ── UI helpers ──
function showLobby()    { document.getElementById('lobby').classList.remove('hidden'); document.getElementById('game-area').classList.add('hidden'); }
function showGame()     { document.getElementById('lobby').classList.add('hidden'); document.getElementById('game-area').classList.remove('hidden'); }
function showOverlay(title, sub) {
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-sub').textContent   = sub;
  document.getElementById('overlay').classList.remove('hidden');
}
function hideOverlay()  { document.getElementById('overlay').classList.add('hidden'); }

function setStatus(msg)  { document.getElementById('status-bar').textContent = msg; }
function setLobbyMsg(msg, err=false) {
  const el = document.getElementById('lobby-msg');
  el.textContent = msg;
  el.className = err ? 'error' : 'info';
}

function updateSidebar() {
  document.getElementById('p0-name').textContent  = state.players[0] || '—';
  document.getElementById('p1-name').textContent  = state.players[1] || '—';
  document.getElementById('p0-score').textContent = `${state.scores[0]} wins`;
  document.getElementById('p1-score').textContent = `${state.scores[1]} wins`;
  document.getElementById('room-name-display').textContent = state.roomId || '—';

  document.getElementById('p0-card').classList.toggle('active', state.turn === 0);
  document.getElementById('p1-card').classList.toggle('active', state.turn === 1);

  if (state.turn !== null) {
    const isMyTurn = state.turn === state.playerIndex;
    document.getElementById('turn-indicator').textContent = isMyTurn ? 'your turn' : "opponent's turn";
  } else {
    document.getElementById('turn-indicator').textContent = '—';
  }
}

// ── Actions ──
function createRoom() {
  const nickname = document.getElementById('nickname').value.trim();
  const roomId   = document.getElementById('create-room-id').value.trim();
  if (!nickname) { setLobbyMsg('Enter a nickname.', true); return; }
  if (!roomId)   { setLobbyMsg('Enter a room name.', true); return; }
  state.myNickname = nickname;
  socket.emit('create_room', { roomId, nickname });
}

function joinRoom() {
  const nickname = document.getElementById('nickname').value.trim();
  const roomId   = document.getElementById('join-room-id').value.trim();
  if (!nickname) { setLobbyMsg('Enter a nickname.', true); return; }
  if (!roomId)   { setLobbyMsg('Enter a room name.', true); return; }
  state.myNickname = nickname;
  socket.emit('join_room', { roomId, nickname });
}

function rematch() {
  hideOverlay();
  socket.emit('rematch', { roomId: state.roomId });
}

function leaveGame() {
  hideOverlay();
  state = { roomId: null, playerIndex: null, board: null, turn: null, scores: [0,0], players: ['',''], myNickname: state.myNickname };
  showLobby();
  setStatus('not connected');
  // Reconnect so a fresh socket is used
  socket.disconnect();
  socket.connect();
}

// ── Socket events ──
socket.on('connect', () => setStatus('connected · ' + socket.id.slice(0,8)));
socket.on('disconnect', () => setStatus('disconnected'));

socket.on('error_msg', msg => setLobbyMsg(msg, true));
socket.on('waiting', msg => setLobbyMsg(msg));

socket.on('room_joined', ({ roomId, playerIndex }) => {
  state.roomId = roomId;
  state.playerIndex = playerIndex;
  setLobbyMsg('');
});

socket.on('game_start', ({ players, board, turn, scores }) => {
  state.players = players;
  state.board   = board;
  state.turn    = turn;
  state.scores  = scores;
  showGame();
  hideOverlay();
  updateSidebar();
  redraw();
});

socket.on('board_update', ({ board, turn }) => {
  state.board = board;
  state.turn  = turn;
  updateSidebar();
  redraw();
});

socket.on('game_over', ({ board, winner, winnerName, scores }) => {
  state.board  = board;
  state.scores = scores;
  state.turn   = null;
  redraw();
  updateSidebar();
  const isMe = winner === state.playerIndex;
  showOverlay(isMe ? 'you win.' : 'you lose.', `${winnerName} placed five in a row`);
});

socket.on('game_draw', ({ board, scores }) => {
  state.board  = board;
  state.scores = scores;
  state.turn   = null;
  redraw();
  updateSidebar();
  showOverlay('draw.', 'the board is full');
});

socket.on('opponent_left', () => {
  state.turn = null;
  updateSidebar();
  showOverlay('opponent left.', 'waiting for a new challenger');
  document.getElementById('overlay-rematch').classList.add('hidden');
  setTimeout(() => {
    document.getElementById('overlay-rematch').classList.remove('hidden');
  }, 100);
});

// initial draw
drawBoard(null);
</script>
</body>
</html>
